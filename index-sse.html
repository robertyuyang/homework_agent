<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 Coze Agent 智能对话（SSE 版本）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            max-height: 800px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .mode-banner {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            text-align: center;
            font-weight: 600;
            font-size: 0.9em;
        }
        .config-panel {
            background: #f8f9fa;
            padding: 15px 20px;
            border-bottom: 2px solid #e9ecef;
        }
        .toggle-config {
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 600;
            padding: 5px 0;
        }
        .config-content {
            display: none;
            margin-top: 15px;
        }
        .config-content.show {
            display: block;
        }
        .config-row {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .config-group {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 200px;
        }
        .config-label {
            font-weight: 600;
            color: #495057;
            font-size: 0.85em;
            white-space: nowrap;
        }
        .config-input {
            padding: 8px 12px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 0.85em;
            flex: 1;
            transition: border-color 0.3s;
        }
        .config-input:focus {
            outline: none;
            border-color: #667eea;
        }
        .config-input.token {
            font-family: 'Courier New', monospace;
        }
        .btn-config {
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85em;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .btn-config:hover {
            background: #5568d3;
            transform: translateY(-1px);
        }
        .btn-config.success {
            background: #28a745;
        }
        .btn-config.secondary {
            background: #6c757d;
        }
        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
            white-space: nowrap;
        }
        .status-disconnected {
            background: #ffebee;
            color: #c62828;
        }
        .status-connected {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            text-align: center;
        }
        .header h1 {
            font-size: 1.5em;
            margin-bottom: 5px;
        }
        .header p {
            opacity: 0.9;
            font-size: 0.85em;
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        .message {
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user {
            flex-direction: row-reverse;
        }
        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            flex-shrink: 0;
        }
        .message.assistant .message-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .message.user .message-avatar {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        .message-content {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 18px;
            line-height: 1.6;
            word-wrap: break-word;
        }
        .message.assistant .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 5px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 5px;
        }
        .input-container {
            padding: 20px;
            background: white;
            border-top: 2px solid #e9ecef;
        }
        .input-wrapper {
            display: flex;
            gap: 15px;
            align-items: flex-end;
        }
        .message-input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #dee2e6;
            border-radius: 15px;
            font-size: 1em;
            resize: none;
            min-height: 50px;
            max-height: 150px;
            transition: border-color 0.3s;
        }
        .message-input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn-send {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-send:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-send:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 15px 20px;
        }
        .typing-dot {
            width: 10px;
            height: 10px;
            background: #667eea;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
        .welcome-message {
            text-align: center;
            padding: 40px 20px;
            color: #6c757d;
        }
        .welcome-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }
        .welcome-message h2 {
            color: #495057;
            margin-bottom: 10px;
        }
        .error-message {
            background: #ffebee;
            border-left: 5px solid #c62828;
            padding: 15px;
            margin: 10px 20px;
            border-radius: 8px;
            color: #c62828;
        }
        .debug-info {
            background: #fff3cd;
            border-left: 5px solid #ffc107;
            padding: 15px;
            margin: 10px 20px;
            border-radius: 8px;
            color: #856404;
            font-size: 0.9em;
        }
        .debug-info pre {
            background: white;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            overflow-x: auto;
        }
        @media (max-width: 768px) {
            .container {
                height: 100vh;
                max-height: none;
                border-radius: 0;
            }
            .config-group {
                min-width: 100%;
            }
            .message-content {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="mode-banner">
            🔌 SSE 流式响应版本 | 内置你的 Cloudflare Workers API
        </div>

        <div class="config-panel">
            <button class="toggle-config" onclick="toggleConfig()">
                ⚙️ 显示/隐藏配置
            </button>

            <div id="configContent" class="config-content">
                <div class="config-row">
                    <div class="config-group">
                        <span class="config-label">API地址:</span>
                        <input type="text" id="apiUrl" class="config-input" 
                               value="https://broad-hat-501f.robertyuyang.workers.dev/?target=https://qz23wrnyv4.coze.site/stream_run">
                    </div>
                    <div class="config-group">
                        <span class="config-label">Project ID:</span>
                        <input type="text" id="projectId" class="config-input" 
                               value="7630729322323787795">
                    </div>
                </div>
                <div class="config-row">
                    <div class="config-group" style="flex: 2;">
                        <span class="config-label">Authorization Token:</span>
                        <input type="password" id="authToken" class="config-input token" 
                               placeholder="eyJhbGciOiJSUzI1NiIs... (不带Bearer)">
                    </div>
                    <div class="config-group">
                        <span class="config-label">Session ID:</span>
                        <input type="text" id="sessionId" class="config-input" 
                               placeholder="会话ID">
                    </div>
                </div>
                <div class="config-row">
                    <button class="btn-config" onclick="generateSessionId()">🔄 生成Session ID</button>
                    <button class="btn-config success" onclick="saveConfig()">💾 保存配置</button>
                    <button class="btn-config secondary" onclick="loadConfig()">📂 加载配置</button>
                    <button class="btn-config" onclick="testConnection()">🔗 测试连接</button>
                    <button class="btn-config secondary" onclick="showDebug()">🔍 调试信息</button>
                    <div id="connectionStatus" class="connection-status status-disconnected" style="margin-left: auto;">
                        <div class="status-dot"></div>
                        <span>未连接</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="header">
            <h1>🤖 Coze Agent 智能对话</h1>
            <p>SSE 流式响应版本 | 配置好 Token 后开始对话</p>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="welcome-message" id="welcomeMessage">
                <div class="welcome-icon">👋</div>
                <h2>欢迎使用 Coze Agent</h2>
                <p><strong style="color: #667eea;">SSE 版本</strong> - 处理流式响应！</p>
                <div style="margin-top: 20px; padding: 15px; background: #e7f3ff; border-radius: 10px; text-align: left;">
                    <strong>💡 快速开始：</strong>
                    <ol style="margin: 10px 0 10px 20px;">
                        <li>点击 "⚙️ 显示配置"</li>
                        <li>填入 Token（<strong>不要</strong>加 Bearer）</li>
                        <li>点击 "💾 保存配置"</li>
                        <li>开始对话！</li>
                    </ol>
                </div>
            </div>
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <textarea id="messageInput" class="message-input" 
                          placeholder="输入你的消息..." 
                          rows="1"
                          onkeydown="handleKeyDown(event)"></textarea>
                <button id="sendButton" class="btn-send" onclick="sendMessage()">发送</button>
            </div>
        </div>
    </div>

    <script>
        let isLoading = false;
        let configVisible = false;
        let showDebugMode = false;

        document.addEventListener('DOMContentLoaded', function() {
            loadConfig();
            if (!document.getElementById('sessionId').value) {
                generateSessionId();
            }
        });

        function toggleConfig() {
            configVisible = !configVisible;
            document.getElementById('configContent').classList.toggle('show', configVisible);
        }

        function generateSessionId() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let result = '';
            for (let i = 0; i < 24; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById('sessionId').value = result;
        }

        function saveConfig() {
            const config = {
                apiUrl: document.getElementById('apiUrl').value,
                projectId: document.getElementById('projectId').value,
                authToken: document.getElementById('authToken').value,
                sessionId: document.getElementById('sessionId').value
            };
            localStorage.setItem('cozeAgentConfig_sse', JSON.stringify(config));
            showNotification('配置已保存！');
        }

        function loadConfig() {
            const savedConfig = localStorage.getItem('cozeAgentConfig_sse');
            if (savedConfig) {
                try {
                    const config = JSON.parse(savedConfig);
                    document.getElementById('apiUrl').value = config.apiUrl || 'https://broad-hat-501f.robertyuyang.workers.dev/?target=https://qz23wrnyv4.coze.site/stream_run';
                    document.getElementById('projectId').value = config.projectId || '7630729322323787795';
                    document.getElementById('authToken').value = config.authToken || '';
                    document.getElementById('sessionId').value = config.sessionId || '';
                } catch (e) {
                    console.error('Failed to load config:', e);
                }
            } else {
                document.getElementById('apiUrl').value = 'https://broad-hat-501f.robertyuyang.workers.dev/?target=https://qz23wrnyv4.coze.site/stream_run';
                document.getElementById('projectId').value = '7630729322323787795';
            }
        }

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: #28a745;
                color: white;
                padding: 15px 20px;
                border-radius: 10px;
                box-shadow: 0 5px 20px rgba(0,0,0,0.2);
                z-index: 10000;
                animation: slideIn 0.3s ease-out;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease-out';
                setTimeout(() => notification.remove(), 300);
            }, 2000);
        }

        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
            @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }
        `;
        document.head.appendChild(style);

        function showDebug() {
            showDebugMode = !showDebugMode;
            
            const existingDebug = document.getElementById('debugInfo');
            if (existingDebug) {
                existingDebug.remove();
                return;
            }

            const apiUrl = document.getElementById('apiUrl').value;
            const authToken = document.getElementById('authToken').value;
            
            const debugDiv = document.createElement('div');
            debugDiv.id = 'debugInfo';
            debugDiv.className = 'debug-info';
            debugDiv.innerHTML = `
                <strong>🔍 调试信息</strong>
                <pre>API URL: ${apiUrl}</pre>
                <pre>Token (长度): ${authToken ? authToken.length : 0} 字符</pre>
                <pre>Token (前缀): ${authToken ? (authToken.startsWith('Bearer ') ? '❌ 有 Bearer' : '✅ 无 Bearer') : '(空)'}</pre>
                <hr style="margin: 10px 0;">
                <strong>💡 提示：</strong>
                <p>如果看到 "event: message" 错误，说明是 SSE 流式响应</p>
                <p>这个版本专门处理 SSE 格式！</p>
            `;
            
            const chatContainer = document.getElementById('chatContainer');
            chatContainer.insertBefore(debugDiv, chatContainer.firstChild);
        }

        async function testConnection() {
            const apiUrl = document.getElementById('apiUrl').value;
            const authToken = document.getElementById('authToken').value;
            
            const statusDiv = document.getElementById('connectionStatus');
            statusDiv.innerHTML = '<div class="status-dot"></div><span>测试中...</span>';
            
            if (!apiUrl) {
                statusDiv.innerHTML = '<div class="status-dot"></div><span>需要API地址</span>';
                statusDiv.className = 'connection-status status-disconnected';
                showError('请先输入 API 地址');
                return;
            }
            
            if (!authToken) {
                statusDiv.innerHTML = '<div class="status-dot"></div><span>需要Token</span>';
                statusDiv.className = 'connection-status status-disconnected';
                showError('请先输入 Authorization Token');
                return;
            }

            try {
                const tokenToSend = authToken.startsWith('Bearer ') ? authToken : 'Bearer ' + authToken;
                const testBody = {
                    content: {
                        query: {
                            prompt: [
                                {
                                    type: "text",
                                    content: {
                                        text: "你好"
                                    }
                                }
                            ]
                        }
                    },
                    type: "query",
                    session_id: document.getElementById('sessionId').value,
                    project_id: parseInt(document.getElementById('projectId').value)
                };

                console.log('测试连接 - 请求体:', testBody);

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Authorization': tokenToSend,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(testBody)
                });
                
                const responseText = await response.text();
                console.log('响应:', responseText);
                
                // 尝试解析 JSON
                try {
                    const data = JSON.parse(responseText);
                    console.log('JSON 解析成功:', data);
                    statusDiv.innerHTML = '<div class="status-dot"></div><span>连接成功(JSON)</span>';
                    statusDiv.className = 'connection-status status-connected';
                    showNotification('连接成功！(JSON格式)');
                } catch (e) {
                    console.log('不是 JSON，可能是 SSE 格式');
                    statusDiv.innerHTML = '<div class="status-dot"></div><span>连接成功(SSE)</span>';
                    statusDiv.className = 'connection-status status-connected';
                    showNotification('连接成功！(SSE流式格式)');
                }
                
            } catch (error) {
                console.error('连接失败:', error);
                statusDiv.innerHTML = '<div class="status-dot"></div><span>连接失败</span>';
                statusDiv.className = 'connection-status status-disconnected';
                showError('连接失败: ' + error.message);
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message || isLoading) return;
            
            const apiUrl = document.getElementById('apiUrl').value;
            const authToken = document.getElementById('authToken').value;
            
            if (!apiUrl || !authToken) {
                showError('请先配置 API 地址和 Token！');
                return;
            }
            
            addMessage('user', message);
            input.value = '';
            input.style.height = 'auto';
            
            const welcomeMsg = document.getElementById('welcomeMessage');
            if (welcomeMsg) welcomeMsg.remove();
            
            isLoading = true;
            showTypingIndicator();
            document.getElementById('sendButton').disabled = true;
            
            try {
                const tokenToSend = authToken.startsWith('Bearer ') ? authToken : 'Bearer ' + authToken;
                
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Authorization': tokenToSend,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        content: {
                            query: {
                                prompt: [
                                    {
                                        type: "text",
                                        content: {
                                            text: message
                                        }
                                    }
                                ]
                            }
                        },
                        type: "query",
                        session_id: document.getElementById('sessionId').value,
                        project_id: parseInt(document.getElementById('projectId').value)
                    })
                });
                
                const responseText = await response.text();
                console.log('收到响应:', responseText);
                
                removeTypingIndicator();
                
                let assistantMessage = '';
                
                // 尝试解析 SSE 格式
                if (responseText.includes('event:') || responseText.includes('data:')) {
                    console.log('检测到 SSE 格式');
                    assistantMessage = parseSSE(responseText);
                } else {
                    // 尝试解析 JSON
                    try {
                        const data = JSON.parse(responseText);
                        if (typeof data === 'string') {
                            assistantMessage = data;
                        } else if (data.content) {
                            assistantMessage = data.content;
                        } else if (data.message) {
                            assistantMessage = data.message;
                        } else {
                            assistantMessage = JSON.stringify(data, null, 2);
                        }
                    } catch (e) {
                        assistantMessage = responseText;
                    }
                }
                
                addMessage('assistant', assistantMessage);
                
                document.getElementById('connectionStatus').innerHTML = '<div class="status-dot"></div><span>已连接</span>';
                document.getElementById('connectionStatus').className = 'connection-status status-connected';
                
            } catch (error) {
                removeTypingIndicator();
                showError('错误: ' + error.message);
            } finally {
                isLoading = false;
                document.getElementById('sendButton').disabled = false;
            }
        }

        function parseSSE(text) {
            console.log('解析 SSE 格式...');
            let result = '';
            const lines = text.split('\n');
            
            for (const line of lines) {
                if (line.startsWith('data:')) {
                    const data = line.substring(5).trim();
                    if (data) {
                        try {
                            const jsonData = JSON.parse(data);
                            if (jsonData.content) {
                                result += jsonData.content;
                            } else if (jsonData.message) {
                                result += jsonData.message;
                            } else if (typeof jsonData === 'string') {
                                result += jsonData;
                            }
                        } catch (e) {
                            result += data;
                        }
                    }
                } else if (line.trim() && !line.startsWith('event:')) {
                    result += line + '\n';
                }
            }
            
            return result || text;
        }

        function addMessage(role, content) {
            const chatContainer = document.getElementById('chatContainer');
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = role === 'assistant' ? '🤖' : '👤';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = formatMessage(content);
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function formatMessage(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\n/g, '<br>');
        }

        function showTypingIndicator() {
            const chatContainer = document.getElementById('chatContainer');
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typingIndicator';
            typingDiv.className = 'message assistant';
            typingDiv.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            chatContainer.appendChild(typingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeTypingIndicator() {
            const typingIndicator = document.getElementById('typingIndicator');
            if (typingIndicator) typingIndicator.remove();
        }

        function showError(message) {
            const chatContainer = document.getElementById('chatContainer');
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.innerHTML = message.replace(/\n/g, '<br>');
            chatContainer.appendChild(errorDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            setTimeout(() => {
                if (errorDiv.parentNode) errorDiv.remove();
            }, 8000);
        }

        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        document.getElementById('messageInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });
    </script>
</body>
</html>
