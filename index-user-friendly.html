<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 Coze Agent 智能对话</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            max-height: 800px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .mode-banner {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
            padding: 10px 20px;
            text-align: center;
            font-weight: 600;
            font-size: 0.9em;
        }
        .mode-banner.demo {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        .mode-banner.api {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .config-panel {
            background: #f8f9fa;
            padding: 15px 20px;
            border-bottom: 2px solid #e9ecef;
        }
        .mode-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .mode-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 0.95em;
        }
        .mode-btn:hover {
            border-color: #667eea;
        }
        .mode-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }
        .mode-btn.demo-btn.active {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-color: #f5576c;
        }
        .toggle-config {
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 600;
            padding: 5px 0;
        }
        .config-content {
            display: none;
            margin-top: 15px;
        }
        .config-content.show {
            display: block;
        }
        .config-row {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .config-group {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 200px;
        }
        .config-label {
            font-weight: 600;
            color: #495057;
            font-size: 0.85em;
            white-space: nowrap;
        }
        .config-input {
            padding: 8px 12px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 0.85em;
            flex: 1;
            transition: border-color 0.3s;
        }
        .config-input:focus {
            outline: none;
            border-color: #667eea;
        }
        .config-input.token {
            font-family: 'Courier New', monospace;
        }
        .btn-config {
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85em;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .btn-config:hover {
            background: #5568d3;
            transform: translateY(-1px);
        }
        .btn-config.secondary {
            background: #6c757d;
        }
        .btn-config.success {
            background: #28a745;
        }
        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
            white-space: nowrap;
        }
        .status-disconnected {
            background: #ffebee;
            color: #c62828;
        }
        .status-connected {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .status-demo {
            background: #e7f3ff;
            color: #084298;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            text-align: center;
        }
        .header h1 {
            font-size: 1.5em;
            margin-bottom: 5px;
        }
        .header p {
            opacity: 0.9;
            font-size: 0.85em;
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        .message {
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user {
            flex-direction: row-reverse;
        }
        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            flex-shrink: 0;
        }
        .message.assistant .message-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .message.user .message-avatar {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        .message-content {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 18px;
            line-height: 1.6;
            word-wrap: break-word;
        }
        .message.assistant .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 5px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 5px;
        }
        .input-container {
            padding: 20px;
            background: white;
            border-top: 2px solid #e9ecef;
        }
        .input-wrapper {
            display: flex;
            gap: 15px;
            align-items: flex-end;
        }
        .message-input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #dee2e6;
            border-radius: 15px;
            font-size: 1em;
            resize: none;
            min-height: 50px;
            max-height: 150px;
            transition: border-color 0.3s;
        }
        .message-input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn-send {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-send:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-send:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 15px 20px;
        }
        .typing-dot {
            width: 10px;
            height: 10px;
            background: #667eea;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
        .welcome-message {
            text-align: center;
            padding: 40px 20px;
            color: #6c757d;
        }
        .welcome-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }
        .welcome-message h2 {
            color: #495057;
            margin-bottom: 10px;
        }
        .quick-tips {
            background: #e7f3ff;
            border-left: 5px solid #0d6efd;
            padding: 15px;
            margin-top: 20px;
            border-radius: 10px;
            text-align: left;
            color: #084298;
        }
        .quick-tips h4 {
            margin-bottom: 10px;
        }
        .quick-tips ul {
            margin-left: 20px;
        }
        .quick-tips li {
            margin: 5px 0;
        }
        .error-message {
            background: #ffebee;
            border-left: 5px solid #c62828;
            padding: 15px;
            margin: 10px 20px;
            border-radius: 8px;
            color: #c62828;
        }
        @media (max-width: 768px) {
            .container {
                height: 100vh;
                max-height: none;
                border-radius: 0;
            }
            .config-group {
                min-width: 100%;
            }
            .message-content {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="modeBanner" class="mode-banner demo">
            🎮 当前模式：演示模式 - 无需配置，即可体验！
        </div>

        <div class="config-panel">
            <div class="mode-selector">
                <button class="mode-btn demo-btn active" onclick="setMode('demo')">
                    🎮 演示模式
                </button>
                <button class="mode-btn" onclick="setMode('api')">
                    🔌 API 模式
                </button>
            </div>
            
            <div id="configToggleSection">
                <button class="toggle-config" onclick="toggleConfig()">
                    ⚙️ 显示/隐藏 API 配置
                </button>
            </div>

            <div id="configContent" class="config-content">
                <div class="config-row">
                    <div class="config-group">
                        <span class="config-label">API地址:</span>
                        <input type="text" id="apiUrl" class="config-input" 
                               placeholder="https://your-proxy.workers.dev">
                    </div>
                    <div class="config-group">
                        <span class="config-label">Project ID:</span>
                        <input type="text" id="projectId" class="config-input" 
                               placeholder="Project ID"
                               value="7630729322323787795">
                    </div>
                </div>
                <div class="config-row">
                    <div class="config-group" style="flex: 2;">
                        <span class="config-label">Authorization Token:</span>
                        <input type="password" id="authToken" class="config-input token" 
                               placeholder="eyJhbGciOiJSUzI1NiIs... (不带Bearer)">
                    </div>
                    <div class="config-group">
                        <span class="config-label">Session ID:</span>
                        <input type="text" id="sessionId" class="config-input" 
                               placeholder="会话ID">
                    </div>
                </div>
                <div class="config-row">
                    <button class="btn-config" onclick="generateSessionId()">🔄 生成Session ID</button>
                    <button class="btn-config success" onclick="saveConfig()">💾 保存配置</button>
                    <button class="btn-config secondary" onclick="loadConfig()">📂 加载配置</button>
                    <button class="btn-config" onclick="testConnection()">🔗 测试连接</button>
                    <div id="connectionStatus" class="connection-status status-demo" style="margin-left: auto;">
                        <div class="status-dot"></div>
                        <span>演示模式</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="header">
            <h1>🤖 Coze Agent 智能对话</h1>
            <p id="modeDescription">演示模式 - 无需任何配置，立即体验！</p>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="welcome-message" id="welcomeMessage">
                <div class="welcome-icon">👋</div>
                <h2>欢迎使用 Coze Agent</h2>
                <p id="welcomeText">当前是<strong style="color: #f5576c;">演示模式</strong>，不需要配置任何东西，直接开始对话吧！</p>
                
                <div class="quick-tips">
                    <h4>💡 两种模式：</h4>
                    <ul>
                        <li><strong>🎮 演示模式</strong>（当前）- 模拟对话，体验界面</li>
                        <li><strong>🔌 API 模式</strong> - 配置 API 和 Token，连接真实 Agent</li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <textarea id="messageInput" class="message-input" 
                          placeholder="输入你的消息，试试说：你好" 
                          rows="1"
                          onkeydown="handleKeyDown(event)"></textarea>
                <button id="sendButton" class="btn-send" onclick="sendMessage()">发送</button>
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'demo';
        let isLoading = false;
        let configVisible = false;

        const demoResponses = [
            "你好！我是你的智能助手。有什么我可以帮助你的吗？😊",
            "这是一个很好的问题！让我来帮你分析一下...",
            "我理解你的需求。根据我的分析，我建议...",
            "这个想法很有趣！让我们深入探讨一下...",
            "感谢你的提问！这是我的回答：\n\n1. 首先...\n2. 其次...\n3. 最后...",
            "好的，我来帮你处理这个问题。\n\n```python\n# 示例代码\ndef hello():\n    print('Hello, World!')\n```",
            "明白了！让我为你解释一下这个概念。",
            "当然可以！我很乐意帮助你。请告诉我更多细节...",
            "这是个很棒的问题！让我想想怎么回答最好...",
            "收到你的消息了！让我来回复你..."
        ];

        document.addEventListener('DOMContentLoaded', function() {
            loadConfig();
            if (!document.getElementById('sessionId').value) {
                generateSessionId();
            }
            updateModeUI();
        });

        function setMode(mode) {
            currentMode = mode;
            updateModeUI();
            saveConfig();
        }

        function updateModeUI() {
            const modeBanner = document.getElementById('modeBanner');
            const modeDescription = document.getElementById('modeDescription');
            const welcomeText = document.getElementById('welcomeText');
            const connectionStatus = document.getElementById('connectionStatus');
            const configToggleSection = document.getElementById('configToggleSection');
            
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            if (currentMode === 'demo') {
                document.querySelector('.demo-btn').classList.add('active');
                modeBanner.className = 'mode-banner demo';
                modeBanner.innerHTML = '🎮 当前模式：演示模式 - 无需配置，即可体验！';
                modeDescription.textContent = '演示模式 - 无需任何配置，立即体验！';
                connectionStatus.innerHTML = '<div class="status-dot"></div><span>演示模式</span>';
                connectionStatus.className = 'connection-status status-demo';
                configToggleSection.style.display = 'none';
                document.getElementById('configContent').classList.remove('show');
                
                if (welcomeText) {
                    welcomeText.innerHTML = '当前是<strong style="color: #f5576c;">演示模式</strong>，不需要配置任何东西，直接开始对话吧！';
                }
            } else {
                document.querySelectorAll('.mode-btn:not(.demo-btn)')[0].classList.add('active');
                modeBanner.className = 'mode-banner api';
                modeBanner.innerHTML = '🔌 当前模式：API 模式 - 请先配置 API 和 Token';
                modeDescription.textContent = 'API 模式 - 连接真实的 Coze Agent';
                connectionStatus.innerHTML = '<div class="status-dot"></div><span>未连接</span>';
                connectionStatus.className = 'connection-status status-disconnected';
                configToggleSection.style.display = 'block';
                
                if (welcomeText) {
                    welcomeText.innerHTML = '当前是<strong style="color: #667eea;">API 模式</strong>，请先配置 API 地址和 Token！';
                }
            }
        }

        function toggleConfig() {
            configVisible = !configVisible;
            document.getElementById('configContent').classList.toggle('show', configVisible);
        }

        function generateSessionId() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let result = '';
            for (let i = 0; i < 24; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById('sessionId').value = result;
        }

        function saveConfig() {
            const config = {
                apiUrl: document.getElementById('apiUrl').value,
                projectId: document.getElementById('projectId').value,
                authToken: document.getElementById('authToken').value,
                sessionId: document.getElementById('sessionId').value,
                mode: currentMode
            };
            localStorage.setItem('cozeAgentConfig_v2', JSON.stringify(config));
            showNotification('配置已保存！');
        }

        function loadConfig() {
            const savedConfig = localStorage.getItem('cozeAgentConfig_v2');
            if (savedConfig) {
                try {
                    const config = JSON.parse(savedConfig);
                    document.getElementById('apiUrl').value = config.apiUrl || '';
                    document.getElementById('projectId').value = config.projectId || '7630729322323787795';
                    document.getElementById('authToken').value = config.authToken || '';
                    document.getElementById('sessionId').value = config.sessionId || '';
                    if (config.mode) {
                        currentMode = config.mode;
                    }
                } catch (e) {
                    console.error('Failed to load config:', e);
                }
            }
        }

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: #28a745;
                color: white;
                padding: 15px 20px;
                border-radius: 10px;
                box-shadow: 0 5px 20px rgba(0,0,0,0.2);
                z-index: 10000;
                animation: slideIn 0.3s ease-out;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease-out';
                setTimeout(() => notification.remove(), 300);
            }, 2000);
        }

        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
            @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }
        `;
        document.head.appendChild(style);

        async function testConnection() {
            if (currentMode === 'demo') {
                showNotification('演示模式无需测试连接！');
                return;
            }

            const apiUrl = document.getElementById('apiUrl').value;
            const authToken = document.getElementById('authToken').value;
            const projectId = document.getElementById('projectId').value;
            const sessionId = document.getElementById('sessionId').value;
            
            const statusDiv = document.getElementById('connectionStatus');
            statusDiv.innerHTML = '<div class="status-dot"></div><span>测试中...</span>';
            
            if (!apiUrl) {
                statusDiv.innerHTML = '<div class="status-dot"></div><span>需要API地址</span>';
                statusDiv.className = 'connection-status status-disconnected';
                showError('请先输入 API 地址');
                return;
            }
            
            if (!authToken) {
                statusDiv.innerHTML = '<div class="status-dot"></div><span>需要Token</span>';
                statusDiv.className = 'connection-status status-disconnected';
                showError('请先输入 Authorization Token');
                return;
            }

            const tokenToSend = authToken.startsWith('Bearer ') ? authToken : 'Bearer ' + authToken;
            
            try {
                const testBody = {
                    content: {
                        query: {
                            prompt: [
                                {
                                    type: "text",
                                    content: {
                                        text: "你好"
                                    }
                                }
                            ]
                        }
                    },
                    type: "query",
                    session_id: sessionId,
                    project_id: parseInt(projectId)
                };

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Authorization': tokenToSend,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(testBody)
                });
                
                if (response.ok) {
                    const data = await response.json();
                    statusDiv.innerHTML = '<div class="status-dot"></div><span>连接成功</span>';
                    statusDiv.className = 'connection-status status-connected';
                    showNotification('连接成功！');
                } else {
                    const errorText = await response.text();
                    throw new Error('Server responded with ' + response.status);
                }
            } catch (error) {
                statusDiv.innerHTML = '<div class="status-dot"></div><span>连接失败</span>';
                statusDiv.className = 'connection-status status-disconnected';
                showError('连接失败: ' + error.message);
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message || isLoading) return;
            
            addMessage('user', message);
            input.value = '';
            input.style.height = 'auto';
            
            const welcomeMsg = document.getElementById('welcomeMessage');
            if (welcomeMsg) welcomeMsg.remove();
            
            isLoading = true;
            showTypingIndicator();
            document.getElementById('sendButton').disabled = true;
            
            try {
                let assistantMessage = '';
                
                if (currentMode === 'demo') {
                    assistantMessage = await getDemoResponse(message);
                } else {
                    assistantMessage = await callAPI(message);
                }
                
                removeTypingIndicator();
                addMessage('assistant', assistantMessage);
                
                if (currentMode === 'api') {
                    document.getElementById('connectionStatus').innerHTML = '<div class="status-dot"></div><span>已连接</span>';
                    document.getElementById('connectionStatus').className = 'connection-status status-connected';
                }
                
            } catch (error) {
                removeTypingIndicator();
                showError('错误: ' + error.message);
            } finally {
                isLoading = false;
                document.getElementById('sendButton').disabled = false;
            }
        }

        async function getDemoResponse(message) {
            await new Promise(resolve => setTimeout(resolve, 800 + Math.random() * 1000));
            
            if (message.toLowerCase().includes('你好') || message.toLowerCase().includes('hello')) {
                return "你好！很高兴见到你！我是你的智能助手，有什么我可以帮助你的吗？😊";
            }
            
            if (message.toLowerCase().includes('代码') || message.toLowerCase().includes('code')) {
                return "当然！我可以帮你处理代码问题。\n\n```python\n# 示例代码\ndef calculate_area(rect1, rect2):\n    left = max(rect1[0], rect2[0])\n    right = min(rect1[1], rect2[1])\n    if right <= left:\n        return 0\n    return (right - left) * min(rect1[2], rect2[2])\n```\n\n这是一个计算矩形重合面积的函数示例！";
            }
            
            if (message.toLowerCase().includes('演示') || message.toLowerCase().includes('demo')) {
                return "这是演示模式！\n\n在演示模式下，我会给你模拟的回复。\n\n要使用真实的 Agent，请：\n1. 点击 \"🔌 API 模式\"\n2. 配置你的 API 地址和 Token\n3. 开始对话！";
            }
            
            return demoResponses[Math.floor(Math.random() * demoResponses.length)];
        }

        async function callAPI(message) {
            const apiUrl = document.getElementById('apiUrl').value;
            const authToken = document.getElementById('authToken').value;
            const projectId = document.getElementById('projectId').value;
            const sessionId = document.getElementById('sessionId').value;
            
            if (!apiUrl || !authToken) {
                throw new Error('请先配置 API 地址和 Token，或切换到演示模式！');
            }
            
            const tokenToSend = authToken.startsWith('Bearer ') ? authToken : 'Bearer ' + authToken;
            
            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: {
                    'Authorization': tokenToSend,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    content: {
                        query: {
                            prompt: [
                                {
                                    type: "text",
                                    content: {
                                        text: message
                                    }
                                }
                            ]
                        }
                    },
                    type: "query",
                    session_id: sessionId,
                    project_id: parseInt(projectId)
                })
            });
            
            if (!response.ok) {
                throw new Error('API请求失败: ' + response.status);
            }
            
            const data = await response.json();
            
            let assistantMessage = '';
            if (typeof data === 'string') {
                assistantMessage = data;
            } else if (data.content) {
                assistantMessage = data.content;
            } else if (data.message) {
                assistantMessage = data.message;
            } else if (data.output) {
                assistantMessage = data.output;
            } else {
                assistantMessage = JSON.stringify(data, null, 2);
            }
            
            return assistantMessage;
        }

        function addMessage(role, content) {
            const chatContainer = document.getElementById('chatContainer');
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = role === 'assistant' ? '🤖' : '👤';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = formatMessage(content);
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function formatMessage(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\n/g, '<br>');
        }

        function showTypingIndicator() {
            const chatContainer = document.getElementById('chatContainer');
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typingIndicator';
            typingDiv.className = 'message assistant';
            typingDiv.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            chatContainer.appendChild(typingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeTypingIndicator() {
            const typingIndicator = document.getElementById('typingIndicator');
            if (typingIndicator) typingIndicator.remove();
        }

        function showError(message) {
            const chatContainer = document.getElementById('chatContainer');
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.innerHTML = message.replace(/\n/g, '<br>');
            chatContainer.appendChild(errorDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            setTimeout(() => {
                if (errorDiv.parentNode) errorDiv.remove();
            }, 8000);
        }

        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        document.getElementById('messageInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });
    </script>
</body>
</html>
