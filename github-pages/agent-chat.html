<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 Agent 智能对话</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            max-height: 800px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 顶部配置栏 */
        .config-panel {
            background: #f8f9fa;
            padding: 15px 20px;
            border-bottom: 2px solid #e9ecef;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .config-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .config-label {
            font-weight: 600;
            color: #495057;
            font-size: 0.9em;
        }

        .config-input {
            padding: 8px 12px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 0.9em;
            min-width: 200px;
            transition: border-color 0.3s;
        }

        .config-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-config {
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .btn-config:hover {
            background: #5568d3;
            transform: translateY(-1px);
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .status-disconnected {
            background: #ffebee;
            color: #c62828;
        }

        .status-connected {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* 头部 */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.8em;
            margin-bottom: 5px;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.95em;
        }

        /* 聊天区域 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            flex-shrink: 0;
        }

        .message.assistant .message-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .message.user .message-avatar {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .message-content {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 18px;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .message.assistant .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 5px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 5px;
        }

        .message-content pre {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 10px 0;
            border: 1px solid #dee2e6;
        }

        .message-content code {
            background: rgba(0,0,0,0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
        }

        /* 输入区域 */
        .input-container {
            padding: 20px;
            background: white;
            border-top: 2px solid #e9ecef;
        }

        .input-wrapper {
            display: flex;
            gap: 15px;
            align-items: flex-end;
        }

        .message-input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #dee2e6;
            border-radius: 15px;
            font-size: 1em;
            resize: none;
            min-height: 50px;
            max-height: 150px;
            transition: border-color 0.3s;
        }

        .message-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-send {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-send:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-send:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* 加载动画 */
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 15px 20px;
        }

        .typing-dot {
            width: 10px;
            height: 10px;
            background: #667eea;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }

        /* 模式选择 */
        .mode-selector {
            display: flex;
            gap: 10px;
            margin-left: auto;
        }

        .mode-btn {
            padding: 6px 12px;
            border: 2px solid #dee2e6;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 600;
            transition: all 0.3s;
        }

        .mode-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        /* 欢迎消息 */
        .welcome-message {
            text-align: center;
            padding: 40px 20px;
            color: #6c757d;
        }

        .welcome-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .welcome-message h2 {
            color: #495057;
            margin-bottom: 10px;
        }

        /* 错误提示 */
        .error-message {
            background: #ffebee;
            border-left: 5px solid #c62828;
            padding: 15px;
            margin: 10px 20px;
            border-radius: 8px;
            color: #c62828;
        }

        /* 滚动条样式 */
        .chat-container::-webkit-scrollbar {
            width: 8px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        .chat-container::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                height: 100vh;
                max-height: none;
                border-radius: 0;
            }

            .config-panel {
                flex-direction: column;
                align-items: stretch;
            }

            .config-input {
                min-width: auto;
                width: 100%;
            }

            .mode-selector {
                margin-left: 0;
                justify-content: center;
            }

            .message-content {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 配置面板 -->
        <div class="config-panel">
            <div class="config-group">
                <span class="config-label">后端地址:</span>
                <input type="text" id="apiUrl" class="config-input" 
                       placeholder="http://localhost:8000/chat"
                       value="http://localhost:8000/chat">
            </div>
            <div class="config-group">
                <button class="btn-config" onclick="testConnection()">测试连接</button>
            </div>
            <div id="connectionStatus" class="connection-status status-disconnected">
                <div class="status-dot"></div>
                <span>未连接</span>
            </div>
            <div class="mode-selector">
                <button class="mode-btn active" onclick="setMode('demo')" id="demoMode">演示模式</button>
                <button class="mode-btn" onclick="setMode('api')" id="apiMode">API模式</button>
            </div>
        </div>

        <!-- 头部 -->
        <div class="header">
            <h1>🤖 Agent 智能对话</h1>
            <p id="modeDescription">演示模式 - 体验完整界面功能</p>
        </div>

        <!-- 聊天区域 -->
        <div class="chat-container" id="chatContainer">
            <div class="welcome-message">
                <div class="welcome-icon">👋</div>
                <h2>欢迎使用 Agent 智能对话</h2>
                <p id="welcomeText">这是演示模式，可以体验完整的界面交互。</p>
                <p style="margin-top: 15px; font-size: 0.9em;">
                    💡 <strong>提示</strong>: 切换到 "API模式" 并配置你的后端地址，即可使用真实的 Agent 服务！
                </p>
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="input-container">
            <div class="input-wrapper">
                <textarea id="messageInput" class="message-input" 
                          placeholder="输入你的消息..." 
                          rows="1"
                          onkeydown="handleKeyDown(event)"></textarea>
                <button id="sendButton" class="btn-send" onclick="sendMessage()">发送</button>
            </div>
        </div>
    </div>

    <script>
        // 状态管理
        let currentMode = 'demo'; // 'demo' 或 'api'
        let isLoading = false;
        let conversationHistory = [];

        // 演示模式的回复
        const demoResponses = [
            "你好！我是你的智能助手。有什么我可以帮助你的吗？",
            "这是一个很好的问题！让我来帮你分析一下...",
            "我理解你的需求。根据我的分析，我建议...",
            "这个想法很有趣！让我们深入探讨一下...",
            "感谢你的提问！这是我的回答：\n\n1. 首先...\n2. 其次...\n3. 最后...",
            "好的，我来帮你处理这个问题。\n\n```python\n# 示例代码\ndef hello():\n    print('Hello, World!')\n```",
            "明白了！让我为你解释一下这个概念。"
        ];

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadConfig();
        });

        // 模式切换
        function setMode(mode) {
            currentMode = mode;
            
            // 更新按钮状态
            document.getElementById('demoMode').classList.toggle('active', mode === 'demo');
            document.getElementById('apiMode').classList.toggle('active', mode === 'api');
            
            // 更新描述
            const modeDescription = document.getElementById('modeDescription');
            const welcomeText = document.getElementById('welcomeText');
            
            if (mode === 'demo') {
                modeDescription.textContent = '演示模式 - 体验完整界面功能';
                welcomeText.textContent = '这是演示模式，可以体验完整的界面交互。';
            } else {
                modeDescription.textContent = 'API模式 - 连接真实后端服务';
                welcomeText.textContent = '请配置后端地址，然后开始与 Agent 对话！';
            }
            
            // 保存配置
            saveConfig();
        }

        // 保存配置
        function saveConfig() {
            const config = {
                apiUrl: document.getElementById('apiUrl').value,
                mode: currentMode
            };
            localStorage.setItem('agentChatConfig', JSON.stringify(config));
        }

        // 加载配置
        function loadConfig() {
            const savedConfig = localStorage.getItem('agentChatConfig');
            if (savedConfig) {
                try {
                    const config = JSON.parse(savedConfig);
                    document.getElementById('apiUrl').value = config.apiUrl || 'http://localhost:8000/chat';
                    setMode(config.mode || 'demo');
                } catch (e) {
                    console.error('Failed to load config:', e);
                }
            }
        }

        // 测试连接
        async function testConnection() {
            const apiUrl = document.getElementById('apiUrl').value;
            saveConfig();
            
            const statusDiv = document.getElementById('connectionStatus');
            statusDiv.innerHTML = '<div class="status-dot"></div><span>测试中...</span>';
            statusDiv.className = 'connection-status status-connected';
            
            if (currentMode === 'demo') {
                setTimeout(() => {
                    statusDiv.innerHTML = '<div class="status-dot"></div><span>演示模式</span>';
                    statusDiv.className = 'connection-status status-connected';
                }, 1000);
                return;
            }
            
            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        messages: [{ role: 'user', content: 'test' }]
                    })
                });
                
                if (response.ok) {
                    statusDiv.innerHTML = '<div class="status-dot"></div><span>连接成功</span>';
                    statusDiv.className = 'connection-status status-connected';
                } else {
                    throw new Error('Server responded with error');
                }
            } catch (error) {
                statusDiv.innerHTML = '<div class="status-dot"></div><span>连接失败</span>';
                statusDiv.className = 'connection-status status-disconnected';
                showError('连接失败: ' + error.message);
            }
        }

        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message || isLoading) return;
            
            // 保存配置
            saveConfig();
            
            // 显示用户消息
            addMessage('user', message);
            input.value = '';
            input.style.height = 'auto';
            
            // 清空欢迎消息
            if (document.querySelector('.welcome-message')) {
                document.querySelector('.welcome-message').remove();
            }
            
            // 显示加载状态
            isLoading = true;
            showTypingIndicator();
            document.getElementById('sendButton').disabled = true;
            
            try {
                let response;
                
                if (currentMode === 'demo') {
                    // 演示模式
                    response = await getDemoResponse(message);
                } else {
                    // API模式
                    response = await callAgentAPI(message);
                }
                
                // 移除加载状态
                removeTypingIndicator();
                
                // 显示回复
                addMessage('assistant', response);
                
            } catch (error) {
                removeTypingIndicator();
                showError('错误: ' + error.message);
            } finally {
                isLoading = false;
                document.getElementById('sendButton').disabled = false;
            }
        }

        // 演示模式回复
        async function getDemoResponse(message) {
            // 模拟延迟
            await new Promise(resolve => setTimeout(resolve, 1000 + Math.random() * 1000));
            
            // 根据消息内容选择回复
            if (message.toLowerCase().includes('你好') || message.toLowerCase().includes('hello')) {
                return "你好！很高兴见到你！我是你的智能助手，有什么我可以帮助你的吗？😊";
            }
            
            if (message.toLowerCase().includes('代码') || message.toLowerCase().includes('code')) {
                return "当然！我可以帮你处理代码问题。\n\n```python\n# 示例代码\ndef calculate_rectangle_area(rect1, rect2):\n    # 计算重合区域\n    left = max(rect1[0], rect2[0])\n    right = min(rect1[1], rect2[1])\n    bottom = max(rect1[2], rect2[2])\n    top = min(rect1[3], rect2[3])\n    \n    if right <= left or top <= bottom:\n        return 0\n    return (right - left) * (top - bottom)\n```\n\n这是一个计算矩形重合面积的函数示例！";
            }
            
            // 随机选择回复
            return demoResponses[Math.floor(Math.random() * demoResponses.length)];
        }

        // 调用Agent API
        async function callAgentAPI(message) {
            const apiUrl = document.getElementById('apiUrl').value;
            
            // 添加到历史记录
            conversationHistory.push({ role: 'user', content: message });
            
            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    messages: conversationHistory
                })
            });
            
            if (!response.ok) {
                throw new Error('API请求失败: ' + response.status);
            }
            
            const data = await response.json();
            
            // 假设API返回 { content: "..." } 或直接返回字符串
            const assistantMessage = typeof data === 'string' ? data : (data.content || data.message || JSON.stringify(data));
            
            conversationHistory.push({ role: 'assistant', content: assistantMessage });
            
            return assistantMessage;
        }

        // 添加消息
        function addMessage(role, content) {
            const chatContainer = document.getElementById('chatContainer');
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = role === 'assistant' ? '🤖' : '👤';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = formatMessage(content);
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 格式化消息（简单的Markdown支持）
        function formatMessage(text) {
            let formatted = text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\n/g, '<br>');
            
            // 简单的代码块处理
            formatted = formatted.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
            
            return formatted;
        }

        // 显示输入中动画
        function showTypingIndicator() {
            const chatContainer = document.getElementById('chatContainer');
            
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typingIndicator';
            typingDiv.className = 'message assistant';
            typingDiv.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            
            chatContainer.appendChild(typingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 移除输入中动画
        function removeTypingIndicator() {
            const typingIndicator = document.getElementById('typingIndicator');
            if (typingIndicator) {
                typingIndicator.remove();
            }
        }

        // 显示错误
        function showError(message) {
            const chatContainer = document.getElementById('chatContainer');
            
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.textContent = message;
            
            chatContainer.appendChild(errorDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            // 5秒后自动移除
            setTimeout(() => {
                if (errorDiv.parentNode) {
                    errorDiv.remove();
                }
            }, 5000);
        }

        // 处理键盘事件
        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // 自动调整输入框高度
        document.getElementById('messageInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });
    </script>
</body>
</html>
